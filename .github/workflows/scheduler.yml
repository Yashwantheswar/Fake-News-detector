name: Hourly News Scheduler

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install scikit-learn pandas joblib requests newsapi-python schedule

    - name: Run scheduler once
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: python scheduler.py